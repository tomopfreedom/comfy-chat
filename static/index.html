<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComfyUI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #d0d0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── ヘッダー ───────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #8888ff;
      white-space: nowrap;
      margin-right: 4px;
    }
    #header label {
      font-size: 0.72rem;
      color: #777;
      white-space: nowrap;
    }
    #header select,
    #header input[type=number] {
      background: #0f0f1a;
      color: #d0d0e0;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.78rem;
    }
    #checkpoint { max-width: 240px; }

    #lora-toggle-btn {
      background: #1e2a1e;
      color: #80c080;
      border: 1px solid #2a4a2a;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #lora-toggle-btn:hover { background: #243024; }
    #lora-toggle-btn.active { background: #2a4a2a; border-color: #4a8a4a; }

    #aspect-btns {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .aspect-btn {
      background: #1a1a2a;
      color: #8888cc;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .aspect-btn:hover { background: #222244; border-color: #4444aa; }

    #health {
      margin-left: auto;
      display: flex;
      gap: 10px;
    }
    .hdot { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #666; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .dot.ok  { background: #4caf50; }
    .dot.err { background: #f44336; }

    /* ── LoRA 管理パネル ─────────────────────────── */
    #lora-panel {
      display: none;
      background: #0d0d20;
      border-bottom: 1px solid #2a2a4a;
      padding: 10px 14px;
      flex-shrink: 0;
      max-height: 220px;
      overflow-y: auto;
    }
    #lora-panel.open { display: block; }

    .lp-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .lp-row:last-child { margin-bottom: 0; }

    #lora-list { margin-bottom: 10px; }
    .lora-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: #141425;
      border-radius: 5px;
      margin-bottom: 4px;
      font-size: 0.78rem;
    }
    .lora-entry-name { color: #a0c0a0; font-family: monospace; flex-shrink: 0; }
    .lora-entry-desc { color: #888; flex: 1; }
    .lora-entry-trigger { color: #6688aa; font-size: 0.7rem; white-space: nowrap; }
    .lora-del-btn {
      background: none;
      border: 1px solid #4a2a2a;
      color: #c06060;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 0.7rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .lora-del-btn:hover { background: #2a1010; }
    .lora-bm-select {
      border: none;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .lora-bm-select:focus { outline: 1px solid #555; }
    .lora-strength-edit {
      width: 46px;
      background: #1a1a2e;
      border: 1px solid #333355;
      color: #8899bb;
      font-size: 0.72rem;
      padding: 2px 4px;
      border-radius: 3px;
      text-align: center;
      flex-shrink: 0;
    }
    .lora-strength-edit:focus { border-color: #5566aa; outline: none; color: #ccd; }

    .lora-badge {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .badge-pony        { background: #2a1a3a; color: #c080ff; border: 1px solid #4a2a6a; }
    .badge-sdxl        { background: #1a2a3a; color: #80c0ff; border: 1px solid #2a4a6a; }
    .badge-flux        { background: #1a3a2a; color: #80ffc0; border: 1px solid #2a6a4a; }
    .badge-illustrious { background: #2a1a1a; color: #ff9060; border: 1px solid #6a2a1a; }
    .badge-any         { background: #2a2a2a; color: #aaaaaa; border: 1px solid #4a4a4a; }

    /* 非互換 LoRA をグレーアウト */
    .lora-entry.incompatible { opacity: 0.35; }

    #lora-empty { color: #3a3a5a; font-size: 0.8rem; padding: 4px 0 8px; }

    .lp-input {
      background: #0f0f1a;
      color: #d0d0e0;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 4px 7px;
      font-size: 0.78rem;
    }
    #lora-file-sel { min-width: 200px; max-width: 260px; }
    #lora-desc-inp { min-width: 160px; flex: 1; }
    #lora-trigger-inp { min-width: 120px; }
    #lora-strength-inp { width: 60px; }
    #lora-add-btn {
      background: #1e3a1e;
      color: #80c080;
      border: 1px solid #2a5a2a;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #lora-add-btn:hover { background: #243a24; }

    /* ── メインレイアウト ────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── チャットパネル ──────────────────────────── */
    #chat-panel {
      width: 44%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a4a;
    }

    #chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #chat-history::-webkit-scrollbar { width: 4px; }
    #chat-history::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }

    .msg {
      max-width: 90%;
      padding: 7px 11px;
      border-radius: 10px;
      font-size: 0.84rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg.user      { align-self: flex-end; background: #252565; color: #c8c8ff; }
    .msg.assistant { align-self: flex-start; background: #1a281a; color: #90c090;
                     font-family: monospace; font-size: 0.73rem; }
    .msg-label { font-size: 0.63rem; opacity: 0.55; margin-bottom: 3px; }

    #chat-empty {
      color: #3a3a5a; font-size: 0.82rem; text-align: center;
      padding: 24px 0; line-height: 1.8;
    }

    /* ── 入力エリア ─────────────────────────────── */
    #input-area {
      padding: 10px; border-top: 1px solid #2a2a4a;
      display: flex; flex-direction: column; gap: 7px; flex-shrink: 0;
    }
    #user-input {
      background: #141420; color: #d0d0e0;
      border: 1px solid #2a2a4a; border-radius: 6px;
      padding: 8px 10px; font-size: 0.88rem;
      resize: vertical; min-height: 70px; max-height: 200px;
      font-family: inherit; width: 100%; line-height: 1.45;
    }
    #user-input:focus { outline: none; border-color: #4444aa; }
    #user-input::placeholder { color: #3a3a5a; }

    #input-controls { display: flex; align-items: center; gap: 8px; }
    .ctrl-label { font-size: 0.72rem; color: #666; white-space: nowrap; }
    #seed-input {
      background: #0f0f1a; color: #d0d0e0;
      border: 1px solid #2a2a4a; border-radius: 4px;
      padding: 3px 6px; font-size: 0.78rem; width: 88px;
    }
    #generate-btn {
      margin-left: auto;
      background: #3a3aaa; color: #fff; border: none;
      border-radius: 6px; padding: 7px 18px;
      font-size: 0.88rem; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    #generate-btn:hover:not(:disabled) { background: #5555cc; }
    #generate-btn:disabled { background: #252535; color: #555; cursor: default; }
    .hint { font-size: 0.65rem; color: #444; white-space: nowrap; }

    /* ── プレビューパネル ─────────────────────────── */
    #preview-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #image-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #080810; overflow: hidden;
    }
    #preview-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; border-radius: 3px; display: none;
    }
    #img-placeholder { color: #282840; font-size: 0.9rem; text-align: center; user-select: none; }
    #spinner {
      display: none; flex-direction: column; align-items: center;
      gap: 14px; color: #555; font-size: 0.85rem;
    }
    .spin-ring {
      width: 38px; height: 38px;
      border: 3px solid #1a1a2e; border-top-color: #5555cc;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── プロンプト情報 ───────────────────────────── */
    #prompt-info {
      padding: 9px 14px; border-top: 1px solid #2a2a4a;
      font-size: 0.73rem; background: #0c0c18;
      max-height: 140px; overflow-y: auto; flex-shrink: 0;
    }
    #prompt-info::-webkit-scrollbar { width: 3px; }
    #prompt-info::-webkit-scrollbar-thumb { background: #2a2a4a; }
    .pi-row { display: flex; gap: 7px; margin-bottom: 4px; line-height: 1.4; }
    .pi-lbl { color: #556688; font-weight: 600; white-space: nowrap; min-width: 54px; }
    .pi-val { color: #8aacb8; word-break: break-word; }
    .pi-val.seed  { color: #9999ee; font-family: monospace; }
    .pi-val.loras { color: #80c080; font-family: monospace; }
    #pi-empty { color: #2a2a4a; font-size: 0.78rem; }

    /* ── お気に入りパネル ────────────────────────── */
    #fav-toggle-btn {
      background: #2a251a;
      color: #c0a040;
      border: 1px solid #4a3a1a;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #fav-toggle-btn:hover { background: #3a3010; }
    #fav-toggle-btn.active { background: #3a3010; border-color: #7a6020; }

    #fav-panel {
      display: none;
      background: #0d0d1a;
      border-bottom: 1px solid #2a2a4a;
      padding: 10px 14px;
      flex-shrink: 0;
    }
    #fav-panel.open { display: block; }

    #fav-save-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    #fav-name-inp {
      background: #0f0f1a;
      color: #d0d0e0;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 4px 7px;
      font-size: 0.78rem;
      flex: 1;
      max-width: 280px;
    }
    #fav-save-btn {
      background: #2a251a;
      color: #c0a040;
      border: 1px solid #4a3a1a;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #fav-save-btn:hover { background: #3a3010; }

    #fav-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .fav-entry {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .fav-entry:hover { background: #252545; }
    .fav-name { color: #c0a040; }
    .fav-meta { color: #555; font-size: 0.65rem; }
    .fav-del {
      background: none;
      border: none;
      color: #663333;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0 2px;
      line-height: 1;
    }
    .fav-del:hover { color: #cc5555; }
    #fav-empty { color: #3a3a5a; font-size: 0.8rem; }

    /* ── img2img エリア ──────────────────────────── */
    #img2img-area {
      border: 1px dashed #2a2a4a;
      border-radius: 6px;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    #img2img-area.drag-over { border-color: #5555cc; background: #12122a; }

    #img2img-drop {
      cursor: pointer;
      color: #4a4a6a;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }
    #img2img-drop:hover { color: #7777aa; }

    #img2img-preview {
      display: none;
      align-items: center;
      gap: 8px;
    }
    #img2img-thumb {
      width: 40px; height: 40px;
      object-fit: cover; border-radius: 3px;
      border: 1px solid #2a2a4a; flex-shrink: 0;
    }
    #img2img-name {
      font-size: 0.72rem; color: #8888cc;
      flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    #img2img-clear {
      background: none; border: none;
      color: #663333; cursor: pointer;
      font-size: 0.8rem; padding: 0 2px; line-height: 1;
    }
    #img2img-clear:hover { color: #cc5555; }

    #img2img-denoise {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: #666;
    }
    #denoise-slider {
      flex: 1; accent-color: #5555cc; height: 14px; cursor: pointer;
    }
    #denoise-val { font-family: monospace; color: #8888cc; min-width: 28px; text-align: right; }

    /* ── マスク編集ボタン ────────────────────────── */
    #mask-edit-btn {
      background: #1a1a3a; color: #8888cc;
      border: 1px solid #2a2a5a; border-radius: 3px;
      padding: 2px 7px; font-size: 0.72rem;
      cursor: pointer; flex-shrink: 0;
    }
    #mask-edit-btn:hover { background: #252555; }
    #mask-edit-btn.has-mask { color: #80c080; border-color: #2a5a2a; background: #1a2a1a; }

    /* ── マスク編集モーダル ───────────────────────── */
    #mask-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 100;
      flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 16px;
    }
    #mask-modal.open { display: flex; }

    #mask-modal-header {
      display: flex; align-items: center; gap: 10px;
      background: #1a1a2e; padding: 8px 14px;
      border-radius: 8px; border: 1px solid #2a2a4a;
      width: 100%; max-width: 920px; flex-wrap: wrap;
    }
    #mask-modal-title { color: #8888ff; font-size: 0.82rem; flex: 1; white-space: nowrap; min-width: 160px; }
    .mask-ctrl-group  { display: flex; align-items: center; gap: 5px; }
    .mask-ctrl-label  { font-size: 0.72rem; color: #666; }
    #brush-size       { width: 70px; accent-color: #5555cc; cursor: pointer; }
    #brush-size-val   { font-family: monospace; color: #8888cc; font-size: 0.72rem; min-width: 20px; }

    #eraser-btn, #mask-clear-btn, #mask-cancel-btn, #mask-apply-btn {
      border-radius: 4px; padding: 4px 10px;
      font-size: 0.78rem; cursor: pointer; white-space: nowrap;
    }
    #eraser-btn        { background: #1a1a2e; color: #aaaacc; border: 1px solid #2a2a4a; }
    #eraser-btn.active { background: #2a2a5a; border-color: #5555aa; color: #ccccff; }
    #eraser-btn:hover  { background: #252545; }
    #mask-clear-btn    { background: #2a1a1a; color: #cc7070; border: 1px solid #4a2a2a; }
    #mask-clear-btn:hover { background: #3a1a1a; }
    #mask-cancel-btn   { background: #1a1a2e; color: #888; border: 1px solid #2a2a4a; }
    #mask-cancel-btn:hover { background: #252535; }
    #mask-apply-btn    { background: #1e3a1e; color: #80c080; border: 1px solid #2a5a2a; }
    #mask-apply-btn:hover  { background: #243a24; }

    #mask-canvas-wrapper {
      overflow: auto; max-width: 90vw; max-height: 75vh;
      border-radius: 6px; border: 1px solid #2a2a4a;
    }
    #display-canvas { display: block; cursor: crosshair; touch-action: none; }

    /* ── フレーズサジェスト ──────────────────────── */
    #phrase-bar {
      background: #0a0a16;
      border: 1px solid #1e1e3a;
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #phrase-cats {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid #1e1e3a;
    }
    #phrase-cats::-webkit-scrollbar { display: none; }
    .pcat-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #444466;
      font-size: 0.7rem;
      padding: 4px 9px;
      cursor: pointer;
      white-space: nowrap;
      margin-bottom: -1px;
      transition: color 0.1s;
    }
    .pcat-btn:hover  { color: #7777aa; }
    .pcat-btn.active { color: #8888ff; border-bottom-color: #5555cc; }
    #phrase-chips {
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      padding: 5px 7px;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: #2a2a4a transparent;
    }
    #phrase-chips::-webkit-scrollbar       { height: 3px; }
    #phrase-chips::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
    .pchip {
      background: #141428;
      border: 1px solid #2a2a4a;
      border-radius: 9px;
      color: #7777bb;
      font-size: 0.7rem;
      padding: 2px 8px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .pchip:hover       { background: #1e1e40; color: #aaaaee; border-color: #4444aa; }
    .pchip.recent-chip { color: #88aacc; border-color: #2a3a4a; }

    /* ── タグ確認パネル ─────────────────────────── */
    .confirm-panel {
      border: 1px solid #2a4a2a;
      border-radius: 7px;
      padding: 8px 10px;
      background: #0c1a0c;
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
    }
    .confirm-explanation {
      color: #a0d4a0;
      font-size: 0.82rem;
      line-height: 1.55;
      padding-bottom: 7px;
      border-bottom: 1px solid #1e3a1e;
      margin-bottom: 2px;
    }
    .confirm-lbl {
      font-size: 0.63rem;
      color: #4a6a50;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .confirm-ta {
      background: #0f180f;
      border: 1px solid #1e3a1e;
      color: #90c090;
      font-family: monospace;
      font-size: 0.72rem;
      border-radius: 4px;
      padding: 5px 7px;
      resize: vertical;
      min-height: 70px;
      width: 100%;
      line-height: 1.5;
      overflow-y: hidden;
    }
    .confirm-ta:focus { outline: none; border-color: #3a7a3a; }
    .confirm-neg-ta {
      color: #a08080;
      border-color: #2a1a1a;
      background: #160e0e;
      min-height: 38px;
    }
    .confirm-neg-ta:focus { border-color: #7a3a3a; }
    /* 確認パネル LoRA 選択 */
    .confirm-lora-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 2px;
    }
    .confirm-lora-row {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      padding: 3px 5px;
      border-radius: 4px;
      font-size: 0.78rem;
    }
    .confirm-lora-row:hover { background: #0e200e; }
    .confirm-lora-check { accent-color: #4a9a4a; cursor: pointer; flex-shrink: 0; }
    .confirm-lora-name { color: #80c080; font-family: monospace; flex: 1; }
    .confirm-lora-str  { color: #4a7a4a; font-size: 0.68rem; white-space: nowrap; }
    .confirm-lora-trigger { color: #3a5a3a; font-size: 0.65rem; padding-left: 20px; line-height: 1.3; word-break: break-all; }

    .confirm-actions { display: flex; justify-content: flex-end; margin-top: 2px; }

    /* タグ日本語解説チップ */
    .tag-jp-section {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 20px;
      margin-top: 3px;
    }
    .tag-jp-loading { font-size: 0.65rem; color: #3a5a3a; font-style: italic; align-self: center; }
    .tag-jp-chip {
      background: #091509;
      border: 1px solid #1a3a1a;
      border-radius: 4px;
      padding: 2px 6px;
      display: inline-flex;
      flex-direction: column;
      gap: 0;
      cursor: default;
    }
    .tag-jp-chip:hover { border-color: #3a6a3a; background: #0e200e; }
    .tag-jp-en  { color: #4a7a4a; font-family: monospace; font-size: 0.65rem; line-height: 1.2; }
    .tag-jp-txt { color: #90cc90; font-size: 0.73rem; line-height: 1.35; }

    .confirm-gen-btn {
      background: #1e3a1e;
      color: #70ee70;
      border: 1px solid #3a7a3a;
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
    }
    .confirm-gen-btn:hover:not(:disabled) { background: #2a5a2a; }
    .confirm-gen-btn:disabled { background: #151e15; color: #3a5a3a; cursor: default; }
  </style>
</head>
<body>

<header id="header">
  <h1>🎨 ComfyUI Chat</h1>

  <label title="使用するチェックポイントモデル。Pony / SDXL / Illustrious でプロンプト形式と品質タグが自動切り替わる">モデル</label>
  <select id="checkpoint" title="使用するチェックポイントモデル。Pony / SDXL / Illustrious でプロンプト形式と品質タグが自動切り替わる"><option value="">読み込み中...</option></select>

  <label title="生成画像の横幅（ピクセル）。SDXL 系は 1024 が標準">幅</label>
  <select id="width" title="生成画像の横幅（ピクセル）。SDXL 系は 1024 が標準">
    <option value="768">768</option>
    <option value="832">832</option>
    <option value="1024" selected>1024</option>
    <option value="1152">1152</option>
    <option value="1216">1216</option>
  </select>

  <label title="生成画像の縦幅（ピクセル）。SDXL 系は 1024 が標準">高さ</label>
  <select id="height" title="生成画像の縦幅（ピクセル）。SDXL 系は 1024 が標準">
    <option value="768">768</option>
    <option value="832">832</option>
    <option value="1024" selected>1024</option>
    <option value="1152">1152</option>
    <option value="1216">1216</option>
  </select>

  <div id="aspect-btns" title="よく使うアスペクト比をワンクリックで設定">
    <button class="aspect-btn" data-w="1024" data-h="1024">1:1</button>
    <button class="aspect-btn" data-w="768"  data-h="1024">3:4</button>
    <button class="aspect-btn" data-w="1024" data-h="768" >4:3</button>
    <button class="aspect-btn" data-w="768"  data-h="1152">9:16</button>
    <button class="aspect-btn" data-w="1152" data-h="768" >16:9</button>
  </div>

  <label title="サンプリングステップ数。多いほど高品質だが生成時間が増える（推奨: 20〜30）">Steps</label>
  <input type="number" id="steps" value="25" min="10" max="50" style="width:50px" title="サンプリングステップ数。多いほど高品質だが生成時間が増える（推奨: 20〜30）">

  <label title="プロンプト忠実度（Classifier-Free Guidance）。高いほどプロンプトに強く従い、低いほど自由な表現になる（推奨: 5〜9）">CFG</label>
  <input type="number" id="cfg" value="7" min="1" max="20" step="0.5" style="width:50px" title="プロンプト忠実度（Classifier-Free Guidance）。高いほどプロンプトに強く従い、低いほど自由な表現になる（推奨: 5〜9）">

  <label title="ノイズ除去アルゴリズム。Euler a はアニメ系に安定・多様性あり、DPM++ 2M は高品質でシャープ">Sampler</label>
  <select id="sampler" style="font-size:0.72rem" title="ノイズ除去アルゴリズム。Euler a はアニメ系に安定・多様性あり、DPM++ 2M は高品質でシャープ">
    <option value="euler_ancestral">Euler a</option>
    <option value="euler">Euler</option>
    <option value="dpmpp_2m">DPM++ 2M</option>
    <option value="dpmpp_2m_sde">DPM++ 2M SDE</option>
    <option value="dpmpp_sde">DPM++ SDE</option>
    <option value="dpmpp_3m_sde">DPM++ 3M SDE</option>
    <option value="ddim">DDIM</option>
    <option value="lcm">LCM</option>
  </select>

  <label title="ノイズスケジューリング方式。Karras は段階的にノイズを減らし多くの場合で安定した高品質">Schedule</label>
  <select id="scheduler" style="font-size:0.72rem" title="ノイズスケジューリング方式。Karras は段階的にノイズを減らし多くの場合で安定した高品質">
    <option value="karras">Karras</option>
    <option value="normal">Normal</option>
    <option value="exponential">Exponential</option>
    <option value="sgm_uniform">SGM Uniform</option>
    <option value="simple">Simple</option>
  </select>

  <label style="display:flex;align-items:center;gap:5px;cursor:pointer" title="低解像度で生成後に 2x アップスケールして再サンプリング。ディテールが向上するが生成時間が約2倍になる">
    <input type="checkbox" id="hires-fix" style="accent-color:#6666cc">
    <span style="font-size:0.72rem;color:#aaa">Hires fix</span>
  </label>

  <label style="display:flex;align-items:center;gap:5px;cursor:pointer" title="顔・手を自動検出して再インペイント。顔崩れや指の破綻を修正する（生成時間が増加）">
    <input type="checkbox" id="adetail" style="accent-color:#66aa66">
    <span style="font-size:0.72rem;color:#aaa">ADetail</span>
  </label>

  <button id="lora-toggle-btn">🧩 LoRA 管理</button>
  <button id="fav-toggle-btn">⭐ お気に入り</button>

  <div id="health">
    <div class="hdot"><div class="dot" id="dot-llm"></div><span>LLM</span></div>
    <div class="hdot"><div class="dot" id="dot-comfy"></div><span>ComfyUI</span></div>
  </div>
</header>

<!-- LoRA 管理パネル（トグル） -->
<div id="lora-panel">
  <div id="lora-list"><span id="lora-empty">登録済み LoRA はありません</span></div>

  <div class="lp-row">
    <select id="lora-file-sel" class="lp-input">
      <option value="">LoRA ファイルを選択...</option>
    </select>
    <input id="lora-desc-inp" class="lp-input"
           placeholder="説明（例: アニメ風スタイル、日本語で）" type="text">
    <input id="lora-trigger-inp" class="lp-input"
           placeholder="トリガーワード（任意）" type="text" style="width:160px">
    <label style="font-size:0.72rem;color:#777;white-space:nowrap;align-self:center">強度</label>
    <input id="lora-strength-inp" class="lp-input" type="number"
           value="0.75" min="0.1" max="1.5" step="0.05">
    <select id="lora-base-model" class="lp-input" style="width:100px">
      <option value="pony">Pony</option>
      <option value="sdxl">SDXL</option>
      <option value="flux">Flux</option>
      <option value="illustrious">Illustrious</option>
      <option value="any">汎用</option>
    </select>
    <button id="lora-add-btn">＋ 登録</button>
  </div>
</div>

<!-- お気に入りパネル（トグル） -->
<div id="fav-panel">
  <div id="fav-save-row">
    <input id="fav-name-inp" type="text"
           placeholder="名前を入力して現在の設定を保存...">
    <button id="fav-save-btn">★ 保存</button>
  </div>
  <div id="fav-list">
    <span id="fav-empty">保存済みのお気に入りはありません</span>
  </div>
</div>

<main id="main">
  <!-- チャットパネル -->
  <div id="chat-panel">
    <div id="chat-history">
      <div id="chat-empty">
        日本語で画像の内容を入力してください<br>
        <span style="font-size:0.72rem">例：赤いドレスの女性が花畑に立っている</span>
      </div>
    </div>

    <div id="input-area">
      <!-- img2img 参照画像（省略可） -->
      <div id="img2img-area">
        <div id="img2img-drop">
          <span>📎</span>
          <span>参照画像（ドラッグ&ドロップ またはクリック）</span>
          <input type="file" id="img2img-input" accept="image/*" style="display:none">
        </div>
        <div id="img2img-preview">
          <img id="img2img-thumb" alt="">
          <span id="img2img-name"></span>
          <button id="mask-edit-btn" title="マスクを描いてインペイント">✏️ マスク</button>
          <button id="img2img-clear" title="クリア">✕</button>
        </div>
        <div id="img2img-denoise">
          <span>変化量</span>
          <input type="range" id="denoise-slider" min="0.1" max="1.0" step="0.05" value="0.75">
          <span id="denoise-val">0.75</span>
        </div>
      </div>
      <!-- フレーズサジェスト -->
      <div id="phrase-bar">
        <div id="phrase-cats"></div>
        <div id="phrase-chips"></div>
      </div>
      <textarea id="user-input"
        placeholder="例：青空の下でコーヒーを飲む猫、アニメ風..."></textarea>
      <div id="input-controls">
        <span class="ctrl-label">Seed</span>
        <input type="number" id="seed-input" value="-1" title="-1 でランダム">
        <span class="hint">Ctrl+Enter</span>
        <button id="generate-btn">生成</button>
      </div>
    </div>
  </div>

  <!-- プレビューパネル -->
  <div id="preview-panel">
    <div id="image-container">
      <div id="img-placeholder">画像がここに表示されます</div>
      <div id="spinner">
        <div class="spin-ring"></div>
        <span>生成中...</span>
      </div>
      <img id="preview-img" alt="生成画像">
    </div>

    <div id="prompt-info">
      <span id="pi-empty">プロンプト情報がここに表示されます</span>
    </div>
  </div>
</main>

<!-- マスク編集モーダル -->
<div id="mask-modal">
  <div id="mask-modal-header">
    <span id="mask-modal-title">✏️ マスク編集 — 再生成したい部分を塗ってください</span>
    <div class="mask-ctrl-group">
      <span class="mask-ctrl-label">ブラシ</span>
      <input type="range" id="brush-size" min="5" max="100" value="30">
      <span id="brush-size-val">30</span>
    </div>
    <button id="eraser-btn">消しゴム</button>
    <button id="mask-clear-btn">クリア</button>
    <button id="mask-cancel-btn">キャンセル</button>
    <button id="mask-apply-btn">確定</button>
  </div>
  <div id="mask-canvas-wrapper">
    <canvas id="display-canvas"></canvas>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);

  let chatHistory = [];
  let generating  = false;

  // ── ヘルスチェック ──────────────────────────────────────────────
  async function checkHealth() {
    try {
      const d = await fetch("/api/health").then(r => r.json());
      $("dot-llm").className   = "dot " + (d.llm     ? "ok" : "err");
      $("dot-comfy").className = "dot " + (d.comfyui ? "ok" : "err");
    } catch {
      $("dot-llm").className = $("dot-comfy").className = "dot err";
    }
  }
  checkHealth();
  setInterval(checkHealth, 15000);

  // ── チェックポイント一覧 ────────────────────────────────────────
  async function loadCheckpoints() {
    try {
      const d = await fetch("/api/checkpoints").then(r => r.json());
      const sel = $("checkpoint");
      sel.innerHTML = "";
      (d.checkpoints || []).forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c.replace(/\.safetensors$/i, "");
        sel.appendChild(opt);
      });
      if (!d.checkpoints?.length) sel.innerHTML = '<option value="">取得失敗</option>';
    } catch {
      $("checkpoint").innerHTML = '<option value="">取得失敗</option>';
    }
  }
  loadCheckpoints();

  // ── LoRA 管理 ───────────────────────────────────────────────────

  // LoRA ファイル一覧をセレクターに読み込む
  async function loadLoraFiles() {
    try {
      const d = await fetch("/api/lora-files").then(r => r.json());
      const sel = $("lora-file-sel");
      sel.innerHTML = '<option value="">LoRA ファイルを選択...</option>';
      (d.files || []).forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f.replace(/\.safetensors$/i, "");
        sel.appendChild(opt);
      });
    } catch { /* ComfyUI 未起動時は無視 */ }
  }

  // チェックポイント名からベースモデル種別を返す（サーバーと同じロジック）
  function ckptType(ckptName) {
    const n = (ckptName || "").toLowerCase();
    if (n.includes("pony")) return "pony";
    if (n.includes("flux")) return "flux";
    if (n.includes("illustrious") || n.includes("noobai")) return "illustrious";
    return "sdxl";
  }

  // 登録済み LoRA を表示（現在のチェックポイントで互換性をハイライト）
  async function loadLoraRegistry() {
    try {
      const registry = await fetch("/api/loras").then(r => r.json());
      const list = $("lora-list");
      list.innerHTML = "";
      if (!registry.length) {
        list.innerHTML = '<span id="lora-empty">登録済み LoRA はありません</span>';
        return;
      }
      const currentType = ckptType($("checkpoint").value);
      registry.forEach(entry => {
        const div = document.createElement("div");
        const bm = entry.base_model || "any";
        const compatible = bm === "any" || bm === currentType
          || (currentType === "illustrious" && bm === "sdxl");
        div.className = "lora-entry" + (compatible ? "" : " incompatible");
        div.dataset.baseModel = bm;

        const trigger = entry.trigger_words
          ? `<span class="lora-entry-trigger">trigger: ${esc(entry.trigger_words)}</span>` : "";
        const badgeLabels = {pony:"Pony", sdxl:"SDXL", flux:"Flux", illustrious:"Illustrious", any:"汎用"};
        const badgeLabel = badgeLabels[bm] || bm;
        const bmOptions = Object.entries(badgeLabels)
          .map(([v,l]) => `<option value="${v}"${v===bm?" selected":""}>${l}</option>`).join("");
        div.innerHTML = `
          <select class="lora-bm-select badge-${bm}" title="モデル種別" data-fn="${esc(entry.filename)}">${bmOptions}</select>
          <span class="lora-entry-name">${esc(entry.filename.replace(/\.safetensors$/i,""))}</span>
          <span class="lora-entry-desc">${esc(entry.description)}</span>
          ${trigger}
          <input class="lora-strength-edit" type="number" title="倍率"
                 value="${entry.default_strength}" min="0.1" max="2.0" step="0.05"
                 data-fn="${esc(entry.filename)}">
          <button class="lora-del-btn" data-fn="${esc(entry.filename)}">削除</button>`;
        list.appendChild(div);
      });
      list.querySelectorAll(".lora-del-btn").forEach(btn => {
        btn.addEventListener("click", () => deleteLora(btn.dataset.fn));
      });
      list.querySelectorAll(".lora-strength-edit").forEach(inp => {
        inp.addEventListener("change", () => updateLoraStrength(inp.dataset.fn, parseFloat(inp.value)));
      });
      list.querySelectorAll(".lora-bm-select").forEach(sel => {
        sel.addEventListener("change", async () => {
          const bm = sel.value;
          try {
            const resp = await fetch("/api/loras/" + encodeURIComponent(sel.dataset.fn), {
              method: "PATCH",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({base_model: bm}),
            });
            const d = await resp.json();
            if (d.ok) {
              sel.className = "lora-bm-select badge-" + bm;
              await loadLoraRegistry();
            } else { alert("更新失敗: " + (d.error || "")); }
          } catch (e) { alert("エラー: " + e.message); }
        });
      });
    } catch {}
  }

  async function updateLoraStrength(filename, strength) {
    if (isNaN(strength)) return;
    try {
      const resp = await fetch("/api/loras/" + encodeURIComponent(filename), {
        method: "PATCH",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({default_strength: strength}),
      });
      const d = await resp.json();
      if (!d.ok) alert("倍率の更新に失敗: " + (d.error || ""));
    } catch (e) { alert("エラー: " + e.message); }
  }

  // チェックポイント変更時にパネルが開いていれば互換性表示を更新
  $("checkpoint").addEventListener("change", () => {
    if ($("lora-panel").classList.contains("open")) {
      loadLoraRegistry();
    }
  });

  // LoRA 登録
  async function addLora() {
    const filename    = $("lora-file-sel").value.trim();
    const description = $("lora-desc-inp").value.trim();
    if (!filename || !description) {
      alert("LoRA ファイルと説明は必須です");
      return;
    }
    const body = {
      filename,
      description,
      trigger_words:    $("lora-trigger-inp").value.trim(),
      default_strength: parseFloat($("lora-strength-inp").value) || 0.75,
      base_model:       $("lora-base-model").value,
    };
    try {
      const d = await fetch("/api/loras", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body),
      }).then(r => r.json());
      if (d.ok) {
        $("lora-desc-inp").value = "";
        $("lora-trigger-inp").value = "";
        $("lora-file-sel").value = "";
        await loadLoraRegistry();
      } else {
        alert("登録失敗: " + d.error);
      }
    } catch (e) { alert("エラー: " + e.message); }
  }

  // LoRA 削除
  async function deleteLora(filename) {
    if (!confirm(`「${filename}」の登録を削除しますか？`)) return;
    try {
      await fetch("/api/loras/" + encodeURIComponent(filename), {method: "DELETE"});
      await loadLoraRegistry();
    } catch (e) { alert("エラー: " + e.message); }
  }

  // アスペクト比ボタン
  document.querySelectorAll(".aspect-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      $("width").value  = btn.dataset.w;
      $("height").value = btn.dataset.h;
    });
  });

  // LoRA パネル トグル
  $("lora-toggle-btn").addEventListener("click", () => {
    const panel = $("lora-panel");
    const isOpen = panel.classList.toggle("open");
    $("lora-toggle-btn").classList.toggle("active", isOpen);
    if (isOpen) {
      loadLoraFiles();
      loadLoraRegistry();
    }
  });

  $("lora-add-btn").addEventListener("click", addLora);

  // ── チャット表示 ────────────────────────────────────────────────
  function addMsg(role, text) {
    const hist = $("chat-history");
    const empty = $("chat-empty");
    if (empty) empty.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const lbl = document.createElement("div");
    lbl.className = "msg-label";
    lbl.textContent = role === "user" ? "あなた" : "AI プロンプト";
    const body = document.createElement("div");
    body.textContent = text;
    wrap.appendChild(lbl);
    wrap.appendChild(body);
    hist.appendChild(wrap);
    hist.scrollTop = hist.scrollHeight;
  }

  // ── プロンプト情報表示 ──────────────────────────────────────────
  function showPromptInfo(positive, negative, seed, loras) {
    let loraHtml = "";
    if (loras && loras.length) {
      const names = loras.map(l => `${l.name.replace(/\.safetensors$/i,"")}(×${l.strength||"?"})`).join(", ");
      loraHtml = `<div class="pi-row">
        <span class="pi-lbl">LoRA</span>
        <span class="pi-val loras">${esc(names)}</span>
      </div>`;
    }
    $("prompt-info").innerHTML = `
      <div class="pi-row"><span class="pi-lbl">positive</span><span class="pi-val">${esc(positive)}</span></div>
      <div class="pi-row"><span class="pi-lbl">negative</span><span class="pi-val">${esc(negative)}</span></div>
      <div class="pi-row"><span class="pi-lbl">seed</span><span class="pi-val seed">${seed}</span></div>
      ${loraHtml}`;
  }

  function setGenerating(state) {
    generating = state;
    $("generate-btn").disabled = state;
    $("generate-btn").textContent = state ? "生成中..." : "生成";
    if (state) {
      $("img-placeholder").style.display = "none";
      $("preview-img").style.display = "none";
      $("spinner").style.display = "flex";
    } else {
      $("spinner").style.display = "none";
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── 生成実行（Step 1: LLM 翻訳 → 確認パネル表示） ──────────────
  async function generate() {
    if (generating) return;
    const text = $("user-input").value.trim();
    if (!text) return;

    addMsg("user", text);
    $("user-input").value = "";
    setGenerating(true);

    try {
      const d = await fetch("/api/translate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          message:    text,
          history:    chatHistory.slice(-6),
          checkpoint: $("checkpoint").value,
        }),
      }).then(r => r.json());

      if (!d.ok) {
        addMsg("assistant", "⚠ " + (d.error || "不明なエラー"));
        return;
      }

      addConfirmMsg(d.positive, d.negative, d.loras, text, d.explanation || "", d.available_loras || []);
    } catch (e) {
      addMsg("assistant", "⚠ 通信エラー: " + e.message);
    } finally {
      setGenerating(false);
    }
  }

  // 確認パネルをチャットに追加
  function addConfirmMsg(positive, negative, loras, originalText, explanation, availableLoras) {
    const hist = $("chat-history");
    const empty = $("chat-empty");
    if (empty) empty.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.style.maxWidth = "100%";
    const lbl = document.createElement("div");
    lbl.className = "msg-label";
    lbl.textContent = "AI プロンプト (確認)";
    const panel = document.createElement("div");
    panel.className = "confirm-panel";
    const explanationHtml = explanation
      ? `<div class="confirm-explanation">${esc(explanation)}</div>` : "";

    const selectedNames = new Set((loras || []).map(l => l.name));
    const positiveLower = positive.toLowerCase();
    const loraRowsHtml = (availableLoras || []).map(entry => {
      const llmSelected = selectedNames.has(entry.filename);
      // trigger_words のいずれかが positive に含まれていれば自動チェック
      const triggerInPos = (entry.trigger_words || "").split(",").some(t => {
        const tk = t.trim().toLowerCase();
        return tk.length > 3 && positiveLower.includes(tk);
      });
      const checked = (llmSelected || triggerInPos) ? "checked" : "";
      const shortName = entry.filename.replace(/\.safetensors$/i, "");
      const trigger = (entry.trigger_words || "").trim();
      const triggerHtml = trigger
        ? `<div class="confirm-lora-trigger">trigger: ${esc(trigger)}</div>` : "";
      return `<label class="confirm-lora-row">` +
        `<input type="checkbox" class="confirm-lora-check" ${checked} ` +
        `data-filename="${esc(entry.filename)}" data-strength="${entry.default_strength || 0.75}" ` +
        `data-trigger="${esc(trigger)}">` +
        `<span class="confirm-lora-name">${esc(shortName)}</span>` +
        `<span class="confirm-lora-str">×${entry.default_strength || 0.75}</span>` +
        `</label>` + triggerHtml;
    }).join("");
    const loraSectionHtml = (availableLoras && availableLoras.length)
      ? `<div class="confirm-lbl" style="margin-top:4px">使用するLoRA</div>` +
        `<div class="confirm-lora-section">${loraRowsHtml}</div>` : "";

    panel.innerHTML =
      explanationHtml +
      `<div class="confirm-lbl">positive</div>` +
      `<textarea class="confirm-ta confirm-pos-ta">${esc(positive)}</textarea>` +
      `<div class="tag-jp-section"><span class="tag-jp-loading">タグを解説中...</span></div>` +
      `<div class="confirm-lbl">negative</div>` +
      `<textarea class="confirm-ta confirm-neg-ta">${esc(negative)}</textarea>` +
      loraSectionHtml +
      `<div class="confirm-actions">` +
      `<button class="confirm-gen-btn">この内容で生成</button>` +
      `</div>`;
    wrap.appendChild(lbl);
    wrap.appendChild(panel);
    hist.appendChild(wrap);

    // テキストエリアをコンテンツに合わせて自動リサイズ
    panel.querySelectorAll(".confirm-ta").forEach(ta => {
      ta.style.height = "auto";
      ta.style.height = Math.max(70, ta.scrollHeight) + "px";
      ta.addEventListener("input", () => {
        ta.style.height = "auto";
        ta.style.height = Math.max(70, ta.scrollHeight) + "px";
      });
    });

    hist.scrollTop = hist.scrollHeight;
    panel.querySelector(".confirm-gen-btn").addEventListener("click", () => {
      generateFromConfirmed(wrap, panel, loras, originalText);
    });

    // タグ日本語解説を非同期で取得（確認パネル表示後にバックグラウンド実行）
    const tagSection = panel.querySelector(".tag-jp-section");
    fetch("/api/explain-tags", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({positive}),
    }).then(r => r.json()).then(d => {
      if (!d.ok || !d.tags || !d.tags.length) {
        tagSection.innerHTML = "";
        return;
      }
      tagSection.innerHTML = d.tags.map(t =>
        `<span class="tag-jp-chip">` +
        `<span class="tag-jp-en">${esc(t.en)}</span>` +
        `<span class="tag-jp-txt">${esc(t.jp)}</span>` +
        `</span>`
      ).join("");
      hist.scrollTop = hist.scrollHeight;
    }).catch(() => { tagSection.innerHTML = ""; });
  }

  // Step 2: 確認済みタグで ComfyUI に送信
  async function generateFromConfirmed(msgDiv, panel, loras, originalText) {
    if (generating) return;
    const confirmedPos = panel.querySelector(".confirm-pos-ta").value.trim();
    const confirmedNeg = panel.querySelector(".confirm-neg-ta").value.trim();
    const btn = panel.querySelector(".confirm-gen-btn");
    btn.disabled = true;
    btn.textContent = "生成中...";
    setGenerating(true);

    // チェックされた LoRA を収集（LoRA セクションが表示されている場合はそちらを権威とする）
    const loraSection = panel.querySelector(".confirm-lora-section");
    const checkedLoras = [];
    panel.querySelectorAll(".confirm-lora-check:checked").forEach(cb => {
      checkedLoras.push({name: cb.dataset.filename, strength: parseFloat(cb.dataset.strength)});
    });
    const effectiveLoras = loraSection ? checkedLoras : loras;

    try {
      const d = await fetch("/api/generate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          message:            originalText,
          confirmed_positive: confirmedPos,
          confirmed_negative: confirmedNeg,
          loras:              effectiveLoras,
          checkpoint:         $("checkpoint").value,
          width:              parseInt($("width").value),
          height:             parseInt($("height").value),
          steps:              parseInt($("steps").value),
          cfg:                parseFloat($("cfg").value),
          sampler:            $("sampler").value,
          scheduler:          $("scheduler").value,
          seed:               parseInt($("seed-input").value) || -1,
          hires_fix:          $("hires-fix").checked,
          adetail:            $("adetail").checked,
          init_image:         uploadedImageName || null,
          mask_image:         uploadedMaskName  || null,
          denoise:            uploadedImageName ? parseFloat($("denoise-slider").value) : 1.0,
        }),
      }).then(r => r.json());

      if (!d.ok) {
        btn.disabled = false;
        btn.textContent = "この内容で生成";
        addMsg("assistant", "⚠ " + (d.error || "不明なエラー"));
        return;
      }

      chatHistory.push({role: "user",      content: originalText});
      chatHistory.push({role: "assistant", content: d.positive});
      saveRecentInput(originalText);
      if (activePcat >= PHRASES.length) renderPhraseChips(activePcat);

      // 確認パネルを生成済みサマリに置換
      const summary = d.positive.length > 80
        ? d.positive.slice(0, 80) + "…" : d.positive;
      msgDiv.querySelector(".msg-label").textContent = "AI プロンプト";
      const bodyDiv = document.createElement("div");
      bodyDiv.textContent = summary;
      msgDiv.replaceChild(bodyDiv, panel);

      const img = $("preview-img");
      img.onload = () => { img.style.display = "block"; };
      img.src = d.image_url + "&_t=" + Date.now();

      showPromptInfo(d.positive, d.negative, d.seed, d.loras);
      $("seed-input").value = d.seed;
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "この内容で生成";
      addMsg("assistant", "⚠ 通信エラー: " + e.message);
    } finally {
      setGenerating(false);
    }
  }

  $("generate-btn").addEventListener("click", generate);
  $("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && e.ctrlKey) { e.preventDefault(); generate(); }
  });

  // ── お気に入り ──────────────────────────────────────────────────
  const FAV_KEY = "comfy_chat_favorites";

  function getFavorites() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); } catch { return []; }
  }

  function saveFavorites(favs) {
    localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  }

  function renderFavorites() {
    const favs = getFavorites();
    const list = $("fav-list");
    list.innerHTML = "";
    if (!favs.length) {
      list.innerHTML = '<span id="fav-empty">保存済みのお気に入りはありません</span>';
      return;
    }
    favs.forEach(fav => {
      const div = document.createElement("div");
      div.className = "fav-entry";
      const ckpt = (fav.checkpoint || "?").replace(/\.safetensors$/i, "");
      const ckptShort = ckpt.length > 22 ? ckpt.slice(0, 22) + "…" : ckpt;
      div.innerHTML = `
        <span class="fav-name">${esc(fav.name)}</span>
        <span class="fav-meta">${esc(ckptShort)} ${fav.width}×${fav.height}</span>
        <button class="fav-del" title="削除">✕</button>`;
      div.addEventListener("click", e => {
        if (e.target.classList.contains("fav-del")) return;
        applyFavorite(fav);
      });
      div.querySelector(".fav-del").addEventListener("click", () => deleteFavorite(fav.id));
      list.appendChild(div);
    });
  }

  function applyFavorite(fav) {
    if (fav.message    !== undefined) $("user-input").value    = fav.message;
    if (fav.checkpoint !== undefined) $("checkpoint").value    = fav.checkpoint;
    if (fav.width      !== undefined) $("width").value         = fav.width;
    if (fav.height     !== undefined) $("height").value        = fav.height;
    if (fav.steps      !== undefined) $("steps").value         = fav.steps;
    if (fav.cfg        !== undefined) $("cfg").value           = fav.cfg;
    $("hires-fix").checked = !!fav.hires_fix;
    $("adetail").checked   = !!fav.adetail;
    if (fav.sampler    !== undefined) $("sampler").value    = fav.sampler;
    if (fav.scheduler  !== undefined) $("scheduler").value  = fav.scheduler;
    if ($("lora-panel").classList.contains("open")) loadLoraRegistry();
  }

  function deleteFavorite(id) {
    saveFavorites(getFavorites().filter(f => f.id !== id));
    renderFavorites();
  }

  function saveCurrentAsFavorite() {
    const name = $("fav-name-inp").value.trim();
    if (!name) { $("fav-name-inp").focus(); return; }
    const fav = {
      id:         Date.now().toString(),
      name,
      message:    $("user-input").value.trim(),
      checkpoint: $("checkpoint").value,
      width:      $("width").value,
      height:     $("height").value,
      steps:      $("steps").value,
      cfg:        $("cfg").value,
      hires_fix:  $("hires-fix").checked,
      adetail:    $("adetail").checked,
      sampler:    $("sampler").value,
      scheduler:  $("scheduler").value,
    };
    saveFavorites([...getFavorites(), fav]);
    $("fav-name-inp").value = "";
    renderFavorites();
  }

  $("fav-toggle-btn").addEventListener("click", () => {
    const panel = $("fav-panel");
    const isOpen = panel.classList.toggle("open");
    $("fav-toggle-btn").classList.toggle("active", isOpen);
    if (isOpen) renderFavorites();
  });

  $("fav-save-btn").addEventListener("click", saveCurrentAsFavorite);
  $("fav-name-inp").addEventListener("keydown", e => {
    if (e.key === "Enter") saveCurrentAsFavorite();
  });

  // ── img2img ─────────────────────────────────────────────────────
  let uploadedImageName = null;
  let uploadedMaskName  = null;
  let maskCanvas = null, maskCtx = null;
  let imgNaturalW = 0,   imgNaturalH = 0;
  let isEraser = false,  isPainting = false;

  $("img2img-drop").addEventListener("click", () => $("img2img-input").click());
  $("img2img-input").addEventListener("change", e => {
    if (e.target.files[0]) handleImageFile(e.target.files[0]);
  });

  const img2imgArea = $("img2img-area");
  img2imgArea.addEventListener("dragover", e => {
    e.preventDefault();
    img2imgArea.classList.add("drag-over");
  });
  img2imgArea.addEventListener("dragleave", e => {
    if (!img2imgArea.contains(e.relatedTarget)) img2imgArea.classList.remove("drag-over");
  });
  img2imgArea.addEventListener("drop", e => {
    e.preventDefault();
    img2imgArea.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith("image/")) handleImageFile(file);
  });

  $("img2img-clear").addEventListener("click", clearImg2img);
  $("denoise-slider").addEventListener("input", () => {
    $("denoise-val").textContent = $("denoise-slider").value;
  });

  async function handleImageFile(file) {
    const form = new FormData();
    form.append("image", file);
    try {
      const d = await fetch("/api/upload", {method: "POST", body: form}).then(r => r.json());
      if (!d.ok) { alert("アップロード失敗: " + (d.error || "不明")); return; }
      uploadedImageName = d.filename;
      const reader = new FileReader();
      reader.onload = ev => {
        const thumb = $("img2img-thumb");
        thumb.onload = () => { imgNaturalW = thumb.naturalWidth; imgNaturalH = thumb.naturalHeight; };
        thumb.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      $("img2img-name").textContent = file.name;
      $("img2img-drop").style.display = "none";
      $("img2img-preview").style.display = "flex";
      $("img2img-denoise").style.display = "flex";
    } catch (e) {
      alert("アップロードエラー: " + e.message);
    }
  }

  function clearImg2img() {
    uploadedImageName = null;
    uploadedMaskName  = null;
    maskCanvas = null; maskCtx = null;
    imgNaturalW = 0;   imgNaturalH = 0;
    isEraser = false;
    $("img2img-input").value = "";
    $("img2img-thumb").src = "";
    $("img2img-name").textContent = "";
    $("img2img-drop").style.display = "";
    $("img2img-preview").style.display = "none";
    $("img2img-denoise").style.display = "none";
    $("mask-edit-btn").classList.remove("has-mask");
  }

  // ── マスク編集 ────────────────────────────────────────────────────
  function openMaskEditor() {
    if (!imgNaturalW || !imgNaturalH) { alert("参照画像がまだ読み込まれていません"); return; }
    if (!maskCanvas) {
      maskCanvas = document.createElement("canvas");
      maskCanvas.width  = imgNaturalW;
      maskCanvas.height = imgNaturalH;
      maskCtx = maskCanvas.getContext("2d");
      maskCtx.fillStyle = "black";
      maskCtx.fillRect(0, 0, imgNaturalW, imgNaturalH);
    }
    const maxW = window.innerWidth  * 0.88;
    const maxH = window.innerHeight * 0.72;
    const scale = Math.min(maxW / imgNaturalW, maxH / imgNaturalH, 1);
    const dCanvas = $("display-canvas");
    dCanvas.width  = Math.round(imgNaturalW * scale);
    dCanvas.height = Math.round(imgNaturalH * scale);
    redrawDisplay();
    $("mask-modal").classList.add("open");
  }

  function redrawDisplay() {
    const dCanvas = $("display-canvas");
    const dCtx    = dCanvas.getContext("2d");
    dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
    dCtx.drawImage($("img2img-thumb"), 0, 0, dCanvas.width, dCanvas.height);
    if (maskCanvas) {
      dCtx.globalAlpha = 0.55;
      dCtx.drawImage(maskCanvas, 0, 0, dCanvas.width, dCanvas.height);
      dCtx.globalAlpha = 1.0;
    }
  }

  function paintAt(cx, cy) {
    if (!maskCanvas) return;
    const dCanvas = $("display-canvas");
    const sx = maskCanvas.width  / dCanvas.width;
    const sy = maskCanvas.height / dCanvas.height;
    const r  = parseInt($("brush-size").value) / 2 * Math.max(sx, sy);
    maskCtx.beginPath();
    maskCtx.arc(cx * sx, cy * sy, r, 0, Math.PI * 2);
    maskCtx.fillStyle = isEraser ? "black" : "red";
    maskCtx.fill();
    redrawDisplay();
  }

  const dCanv = $("display-canvas");
  dCanv.addEventListener("mousedown",  e => { isPainting = true;  const r = dCanv.getBoundingClientRect(); paintAt(e.clientX-r.left, e.clientY-r.top); });
  dCanv.addEventListener("mousemove",  e => { if (!isPainting) return; const r = dCanv.getBoundingClientRect(); paintAt(e.clientX-r.left, e.clientY-r.top); });
  dCanv.addEventListener("mouseup",    () => { isPainting = false; });
  dCanv.addEventListener("mouseleave", () => { isPainting = false; });
  dCanv.addEventListener("touchstart", e => { e.preventDefault(); isPainting = true;  const r = dCanv.getBoundingClientRect(), t = e.touches[0]; paintAt(t.clientX-r.left, t.clientY-r.top); }, {passive:false});
  dCanv.addEventListener("touchmove",  e => { e.preventDefault(); if (!isPainting) return; const r = dCanv.getBoundingClientRect(), t = e.touches[0]; paintAt(t.clientX-r.left, t.clientY-r.top); }, {passive:false});
  dCanv.addEventListener("touchend",   () => { isPainting = false; });

  $("brush-size").addEventListener("input", () => { $("brush-size-val").textContent = $("brush-size").value; });
  $("eraser-btn").addEventListener("click", () => { isEraser = !isEraser; $("eraser-btn").classList.toggle("active", isEraser); });
  $("mask-clear-btn").addEventListener("click", () => {
    if (!maskCtx) return;
    maskCtx.fillStyle = "black";
    maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
    uploadedMaskName = null;
    $("mask-edit-btn").classList.remove("has-mask");
    redrawDisplay();
  });
  $("mask-cancel-btn").addEventListener("click", () => { $("mask-modal").classList.remove("open"); });
  $("mask-apply-btn").addEventListener("click", async () => {
    if (!maskCanvas) return;
    const blob = await new Promise(resolve => {
      const tmp    = document.createElement("canvas");
      tmp.width    = maskCanvas.width; tmp.height = maskCanvas.height;
      const tmpCtx = tmp.getContext("2d");
      tmpCtx.drawImage(maskCanvas, 0, 0);
      const imgData = tmpCtx.getImageData(0, 0, tmp.width, tmp.height);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const val = d[i] > 128 ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = val; d[i+3] = 255;
      }
      tmpCtx.putImageData(imgData, 0, 0);
      tmp.toBlob(resolve, "image/png");
    });
    const form = new FormData();
    form.append("image", blob, "mask.png");
    try {
      const resp = await fetch("/api/upload", {method: "POST", body: form}).then(r => r.json());
      if (!resp.ok) { alert("マスクのアップロードに失敗: " + (resp.error || "")); return; }
      uploadedMaskName = resp.filename;
      $("mask-edit-btn").classList.add("has-mask");
      $("mask-modal").classList.remove("open");
    } catch (e) { alert("エラー: " + e.message); }
  });
  $("mask-edit-btn").addEventListener("click", openMaskEditor);

  // ── フレーズサジェスト ─────────────────────────────────────────────
  const PHRASES = [
    { cat: "構図",         items: ["クローズアップで", "バストアップで", "全身で", "ローアングルで", "ハイアングルで", "サイドビューで", "後ろ姿で", "俯瞰で", "横向きで", "ポートレートで"] },
    { cat: "ライティング", items: ["夕暮れの光で", "夜景背景で", "自然光で", "逆光で", "月明かりで", "朝日の中で", "スタジオ照明で", "薄暗い室内で", "夜の街灯の下で"] },
    { cat: "雰囲気",       items: ["笑顔で", "物憂げに", "真剣な表情で", "恥ずかしそうに", "眠そうに", "怒った様子で", "無表情で", "楽しそうに", "驚いた顔で", "泣いている"] },
    { cat: "場所",         items: ["室内で", "屋外で", "海辺で", "森の中で", "都市背景で", "学校で", "温泉で", "花畑で", "カフェで", "和室で", "公園で", "電車の中で"] },
    { cat: "スタイル",     items: ["アニメ風で", "水彩画風で", "リアル調で", "油絵風で", "イラスト風で", "シンプルな背景で", "モノクロで", "レトロな雰囲気で"] },
  ];
  const RECENT_KEY = "comfy_chat_recent_inputs";
  let activePcat = 0;

  function getRecentInputs() {
    try { return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]"); } catch { return []; }
  }

  function saveRecentInput(text) {
    if (!text) return;
    const recent = getRecentInputs().filter(t => t !== text);
    recent.unshift(text);
    localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 15)));
  }

  function renderPhraseChips(catIdx) {
    const chips = $("phrase-chips");
    chips.innerHTML = "";
    const isRecent = catIdx >= PHRASES.length;
    const items = isRecent ? getRecentInputs() : PHRASES[catIdx].items;

    if (isRecent && !items.length) {
      chips.innerHTML = '<span style="font-size:0.7rem;color:#333355;white-space:nowrap">生成後に最近の入力が表示されます</span>';
      return;
    }
    items.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "pchip" + (isRecent ? " recent-chip" : "");
      btn.textContent = isRecent && item.length > 20 ? item.slice(0, 20) + "…" : item;
      btn.title = item;
      btn.addEventListener("click", () => {
        const ta = $("user-input");
        if (isRecent) {
          ta.value = item;
        } else {
          const v = ta.value.trimEnd();
          ta.value = v ? v + "、" + item : item;
        }
        ta.focus();
      });
      chips.appendChild(btn);
    });
  }

  function buildPhraseTabs() {
    const cats = $("phrase-cats");
    cats.innerHTML = "";
    [...PHRASES.map(p => p.cat), "最近"].forEach((name, i) => {
      const btn = document.createElement("button");
      btn.className = "pcat-btn" + (i === 0 ? " active" : "");
      btn.textContent = name;
      btn.addEventListener("click", () => {
        cats.querySelectorAll(".pcat-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activePcat = i;
        renderPhraseChips(i);
      });
      cats.appendChild(btn);
    });
    renderPhraseChips(0);
  }

  buildPhraseTabs();
</script>
